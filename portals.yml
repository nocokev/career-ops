# Career-Ops Portal Config — Kevin Prokop
# Ops/PM/CoS/Director roles — Front Range CO + Remote US
# Only companies with confirmed working Greenhouse/Ashby/Lever APIs

title_filter:
  positive:
    - "Director of Operations"
    - "VP of Operations"
    - "Vice President of Operations"
    - "Director Operations"
    - "Operations Director"
    - "Program Manager"
    - "Project Manager"
    - "Senior Program Manager"
    - "Senior Project Manager"
    - "Operations Manager"
    - "Senior Operations Manager"
    - "Chief of Staff"
    - "Head of Operations"
    - "Implementation Manager"
    - "Implementation Consultant"
    - "Strategy and Operations"
    - "Strategy & Operations"
    - "Business Value"
    - "Insights and Operations"
    - "Category Manager"
    - "Director of Delivery"
    - "Delivery Manager"
    - "Regional Operations"
    - "Manufacturing Operations"
    - "Production Manager"
    - "Business Operations"
    - "Revenue Operations"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Entry Level"
    - "Co-op"
    - "Software Engineer"
    - "Data Engineer"
    - "Systems Engineer"
    - "Mechanical Engineer"
    - "Electrical Engineer"
    - "Food and Beverage"
    - "Restaurant"
    - "Retail"
    - "Driver"
    - "Warehouse Associate"
    - "TS/SCI"
    - "Clearance Required"
    - "Accounting"
    - "Finance Manager"

search_queries:
  - name: "Greenhouse — Director Ops"
    query: "site:job-boards.greenhouse.io \"Director of Operations\" OR \"VP Operations\" remote"
    enabled: true
  - name: "Greenhouse — Program Manager"
    query: "site:job-boards.greenhouse.io \"Senior Program Manager\" OR \"Senior Project Manager\" remote"
    enabled: true
  - name: "Greenhouse — Chief of Staff"
    query: "site:job-boards.greenhouse.io \"Chief of Staff\" remote"
    enabled: true
  - name: "Ashby — Ops Director"
    query: "site:jobs.ashbyhq.com \"Director of Operations\" OR \"VP Operations\" OR \"Chief of Staff\" remote"
    enabled: true
  - name: "Ashby — Program Manager"
    query: "site:jobs.ashbyhq.com \"Senior Program Manager\" OR \"Operations Manager\" remote"
    enabled: true
  - name: "Lever — Ops Roles"
    query: "site:jobs.lever.co \"Director of Operations\" OR \"Chief of Staff\" OR \"Program Manager\" remote"
    enabled: true

tracked_companies:
  # ── Confirmed Greenhouse API ──
  - name: "Samsara"
    careers_url: "https://job-boards.greenhouse.io/samsara"
    api: "https://boards-api.greenhouse.io/v1/boards/samsara/jobs"
    enabled: true

  - name: "Gusto"
    careers_url: "https://job-boards.greenhouse.io/gusto"
